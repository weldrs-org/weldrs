[package]
name = "weldrs"
version = "0.1.0"
edition = "2024"

[lib]
name = "weldrs"
path = "src/lib.rs"

[dependencies]
polars = { version = "0.46", features = [
    "lazy",
    "cross_join",
    "round_series",
    "log",
    "dtype-u8",
    "dtype-i16",
    "dtype-struct",
    "random",
    "concat_str",
] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
strsim = "0.11"
rayon = "1.11"
rand = "0.8"

[dev-dependencies]
polars = { version = "0.46", features = ["csv"] }
